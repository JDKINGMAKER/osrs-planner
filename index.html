<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSRS Planner — Bazathril</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --gold-dim: #8a6f2e;
    --bg: #0e0c09;
    --bg2: #161310;
    --bg3: #1e1a14;
    --bg4: #262018;
    --text: #e8dcc8;
    --text-dim: #9a8a6a;
    --text-muted: #5a4e38;
    --green: #4a8c5c;
    --green-light: #6ab87a;
    --green-bg: #0d1f12;
    --amber: #b87c2a;
    --amber-light: #e8a840;
    --amber-bg: #1f1608;
    --red: #8c3a3a;
    --red-light: #c45a5a;
    --red-bg: #1f0d0d;
    --border: rgba(201,168,76,0.15);
    --border-strong: rgba(201,168,76,0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
    font-size: 16px;
    line-height: 1.6;
  }

  /* Parchment texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.03) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.02) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 20px 60px; }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border-strong);
    padding: 32px 0 24px;
    margin-bottom: 32px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .header-left h1 {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: .04em;
    line-height: 1;
  }

  .header-left .subtitle {
    font-size: 14px;
    color: var(--text-dim);
    margin-top: 6px;
    font-style: italic;
  }

  .char-badge {
    background: var(--bg3);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 13px;
    color: var(--text-dim);
    text-align: right;
  }

  .char-badge strong { color: var(--gold); font-family: 'Cinzel', serif; font-size: 15px; display: block; }

  /* ── File loader ── */
  .loader-section {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px 32px;
    margin-bottom: 32px;
  }

  .loader-section h2 {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    color: var(--gold-dim);
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .file-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }

  .file-drop {
    background: var(--bg2);
    border: 1px dashed var(--border-strong);
    border-radius: 8px;
    padding: 12px 14px;
    cursor: pointer;
    transition: all .2s;
    text-align: center;
    position: relative;
  }

  .file-drop:hover { border-color: var(--gold); background: var(--bg4); }
  .file-drop.loaded { border-color: var(--green); border-style: solid; }
  .file-drop input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

  .file-drop .drop-icon { font-size: 20px; margin-bottom: 4px; }
  .file-drop .drop-label { font-size: 12px; color: var(--text-dim); font-family: 'Cinzel', serif; letter-spacing: .05em; }
  .file-drop .drop-status { font-size: 11px; margin-top: 4px; color: var(--text-muted); }
  .file-drop.loaded .drop-status { color: var(--green-light); }

  .load-btn {
    background: var(--gold);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    padding: 10px 28px;
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .08em;
    cursor: pointer;
    transition: all .2s;
  }

  .load-btn:hover { background: var(--gold-light); }
  .load-btn:disabled { opacity: .4; cursor: default; }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 32px;
    padding: 16px 20px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .stat-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg4);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 13px;
  }

  .stat-pill .skill-icon { font-size: 14px; }
  .stat-pill .skill-name { color: var(--text-dim); font-size: 12px; }
  .stat-pill .skill-level { color: var(--gold); font-weight: 600; font-family: 'Cinzel', serif; }
  .stat-pill.maxed { border-color: var(--gold-dim); background: rgba(201,168,76,0.06); }

  /* ── Filters ── */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-label { font-size: 12px; color: var(--text-muted); font-family: 'Cinzel', serif; letter-spacing: .08em; margin-right: 4px; }

  .filter-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    font-family: 'Cinzel', serif;
    letter-spacing: .05em;
    cursor: pointer;
    transition: all .2s;
  }

  .filter-btn:hover { border-color: var(--gold-dim); color: var(--text); }
  .filter-btn.active { border-color: var(--gold); background: rgba(201,168,76,0.1); color: var(--gold); }

  /* ── Activity grid ── */
  .section-heading {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 28px 0 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-heading::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .activity-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }

  .activity-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }

  .activity-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 10px 0 0 10px;
  }

  .activity-card.unlocked { border-color: rgba(74,140,92,0.4); }
  .activity-card.unlocked::before { background: var(--green); }
  .activity-card.close { border-color: rgba(184,124,42,0.4); }
  .activity-card.close::before { background: var(--amber); }
  .activity-card.locked { opacity: .6; }
  .activity-card.locked::before { background: var(--text-muted); }

  .activity-card.milestone-card { border-color: rgba(201,168,76,0.25); }
  .activity-card.milestone-card.unlocked { border-color: rgba(201,168,76,0.6); background: rgba(201,168,76,0.05); }
  .activity-card.milestone-card.unlocked::before { background: var(--gold); }
  .activity-card.milestone-card .card-category { color: var(--gold-dim); }

  .activity-card.completed { border-color: rgba(201,168,76,0.4); opacity: .65; }
  .activity-card.completed::before { background: var(--gold); }
  .activity-card.completed .card-title { color: var(--text-dim); }
  .badge-completed { background: rgba(201,168,76,0.1); color: var(--gold); border: 1px solid var(--gold-dim); }

  .activity-card:hover { transform: translateY(-1px); border-color: var(--border-strong); }
  .activity-card.unlocked:hover { border-color: rgba(74,140,92,0.7); }
  .activity-card.close:hover { border-color: rgba(184,124,42,0.7); }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .card-title {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .card-category {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .card-badge {
    font-size: 11px;
    font-family: 'Cinzel', serif;
    letter-spacing: .05em;
    padding: 3px 10px;
    border-radius: 12px;
    white-space: nowrap;
  }

  .badge-unlocked { background: var(--green-bg); color: var(--green-light); border: 1px solid var(--green); }
  .badge-close { background: var(--amber-bg); color: var(--amber-light); border: 1px solid var(--amber); }
  .badge-locked { background: var(--red-bg); color: var(--red-light); border: 1px solid var(--red); }

  .reqs-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }

  .req-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-dim);
  }

  .req-item .req-icon { font-size: 12px; flex-shrink: 0; }
  .req-item.met { color: var(--green-light); }
  .req-item.unmet { color: var(--red-light); }
  .req-item.close-req { color: var(--amber-light); }

  .req-item .req-icon.met-icon::before { content: '✓'; }
  .req-item .req-icon.unmet-icon::before { content: '✗'; }
  .req-item .req-icon.close-icon::before { content: '◎'; }

  .card-note {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
  }

  /* ── Empty / loading states ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-state .big-icon { font-size: 48px; margin-bottom: 16px; opacity: .4; }
  .empty-state h3 { font-family: 'Cinzel', serif; color: var(--text-dim); margin-bottom: 8px; }
  .empty-state p { font-size: 14px; }

  /* ── Summary bar ── */
  .summary-bar {
    display: flex;
    gap: 20px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .summary-stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .summary-stat .s-num {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
  }

  .summary-stat .s-label {
    font-size: 11px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .s-num.green { color: var(--green-light); }
  .s-num.amber { color: var(--amber-light); }
  .s-num.red { color: var(--red-light); }

  #main-content { display: none; }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="header-left">
      <h1>OSRS Planner</h1>
      <div class="subtitle">Load your Character Export files to begin</div>
    </div>
    <div class="char-badge" id="char-badge" style="display:none">
      <strong id="char-name">—</strong>
      <span id="char-export-time">—</span>
    </div>
  </header>

  <!-- File Loader -->
  <div class="loader-section" id="loader-section">
    <h2>Load Character Export Files</h2>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">
      From RuneLite → Character Export plugin → Open the export folder and drag files below.
      Only <em style="color:var(--text-dim)">character.json</em> and <em style="color:var(--text-dim)">quests.json</em> are required. Bank, diaries and equipment improve results.
    </p>
    <div class="file-grid">
      <label class="file-drop" id="drop-character">
        <input type="file" accept=".json" onchange="loadFile('character', this)">
        <div class="drop-icon">⚔️</div>
        <div class="drop-label">character.json</div>
        <div class="drop-status" id="status-character">Required</div>
      </label>
      <label class="file-drop" id="drop-quests">
        <input type="file" accept=".json" onchange="loadFile('quests', this)">
        <div class="drop-icon">📜</div>
        <div class="drop-label">quests.json</div>
        <div class="drop-status" id="status-quests">Required</div>
      </label>
      <label class="file-drop" id="drop-diaries">
        <input type="file" accept=".json" onchange="loadFile('diaries', this)">
        <div class="drop-icon">📖</div>
        <div class="drop-label">diaries.json</div>
        <div class="drop-status" id="status-diaries">Optional</div>
      </label>
      <label class="file-drop" id="drop-bank">
        <input type="file" accept=".json" onchange="loadFile('bank', this)">
        <div class="drop-icon">🏦</div>
        <div class="drop-label">bank.json</div>
        <div class="drop-status" id="status-bank">Optional</div>
      </label>
      <label class="file-drop" id="drop-equipment">
        <input type="file" accept=".json" onchange="loadFile('equipment', this)">
        <div class="drop-icon">🛡️</div>
        <div class="drop-label">equipment.json</div>
        <div class="drop-status" id="status-equipment">Optional</div>
      </label>
      <label class="file-drop" id="drop-combat">
        <input type="file" accept=".json" onchange="loadFile('combat', this)">
        <div class="drop-icon">🗡️</div>
        <div class="drop-label">combat_achievements.json</div>
        <div class="drop-status" id="status-combat">Optional</div>
      </label>
    </div>
    <button class="load-btn" id="analyse-btn" onclick="runAnalysis()" disabled>Analyse Character</button>
  </div>

  <!-- Main content (shown after analysis) -->
  <div id="main-content">

    <!-- Stats bar -->
    <div class="stats-bar" id="stats-bar"></div>

    <!-- Summary -->
    <div class="summary-bar" id="summary-bar"></div>

    <!-- Filters -->
    <div class="filters">
      <span class="filter-label">Show:</span>
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('unlocked', this)">Unlocked</button>
      <button class="filter-btn" onclick="setFilter('close', this)">Almost there</button>
      <button class="filter-btn" onclick="setFilter('locked', this)">Locked</button>
      <button class="filter-btn" onclick="setFilter('completed', this)">✓ Completed</button>
      <span class="filter-label" style="margin-left:12px">Category:</span>
      <button class="filter-btn active" onclick="setCat('all', this)">All</button>
      <button class="filter-btn" onclick="setCat('bossing', this)">Bossing</button>
      <button class="filter-btn" onclick="setCat('slayer', this)">Slayer</button>
      <button class="filter-btn" onclick="setCat('skilling', this)">Skilling</button>
      <button class="filter-btn" onclick="setCat('diary', this)">Diaries</button>
      <button class="filter-btn" onclick="setCat('poh', this)">PoH</button>
      <button class="filter-btn" onclick="setCat('milestone', this)">⭐ Milestones</button>
    </div>

    <div id="cards-container"></div>

  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
const state = {
  character: null,
  quests: null,
  diaries: null,
  bank: null,
  equipment: null,
  combat: null
};

let currentFilter = 'all';
let currentCat = 'all';

// ─── File loading ─────────────────────────────────────────────────────────────
function loadFile(key, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      state[key] = JSON.parse(e.target.result);
      document.getElementById('drop-' + key).classList.add('loaded');
      document.getElementById('status-' + key).textContent = '✓ Loaded';
      checkReady();
    } catch(err) {
      document.getElementById('status-' + key).textContent = '✗ Invalid JSON';
    }
  };
  reader.readAsText(file);
}

function checkReady() {
  const ready = state.character && state.quests;
  document.getElementById('analyse-btn').disabled = !ready;
}

// ─── Helper functions ─────────────────────────────────────────────────────────
function getLevel(skillName) {
  if (!state.character) return 1;
  const stats = state.character.stats;
  // Try exact match first, then case-insensitive
  const s = stats[skillName] || Object.values(stats).find((_, i) =>
    Object.keys(stats)[i].toLowerCase() === skillName.toLowerCase()
  );
  return s ? s.real_level : 1;
}

function hasQuest(questName) {
  if (!state.quests) return false;
  const q = state.quests.quests.find(q => q.name.toLowerCase() === questName.toLowerCase());
  return q ? q.state === 'FINISHED' : false;
}

function hasDiary(area, tier) {
  if (!state.diaries) return false;
  const d = state.diaries.diaries[area];
  if (!d) return false;
  return d[tier]?.complete === true;
}

function hasItem(itemName) {
  const searchName = itemName.toLowerCase();
  const allItems = [];
  if (state.bank) allItems.push(...state.bank.items);
  if (state.equipment) allItems.push(...state.equipment.items);
  return allItems.some(i => i.name.toLowerCase().includes(searchName));
}

function questCount() {
  if (!state.quests) return 0;
  return state.quests.summary?.finished || 0;
}

// ─── Requirements definition ──────────────────────────────────────────────────
// Each requirement: { type, label, check(), value (optional for 'close' calc) }
// Types: stat, quest, diary, item, other
// Status: met | close | unmet

function reqStat(skill, level) {
  const current = getLevel(skill);
  const met = current >= level;
  const close = !met && current >= level - 5;
  return {
    label: `${skill} ${level} (${current}/${level})`,
    status: met ? 'met' : close ? 'close' : 'unmet'
  };
}

function reqQuest(name) {
  const met = hasQuest(name);
  return { label: name, status: met ? 'met' : 'unmet' };
}

function reqDiary(area, tier) {
  const met = hasDiary(area, tier);
  return { label: `${area} ${tier} diary`, status: met ? 'met' : 'unmet' };
}

function reqItem(name) {
  const met = hasItem(name);
  return { label: `Own: ${name}`, status: met ? 'met' : 'unmet' };
}

function reqOther(label, met) {
  return { label, status: met ? 'met' : 'unmet' };
}

// ─── Activity definitions ─────────────────────────────────────────────────────
function getActivities() {
  const questCape = questCount() >= 200;

  return [
    // ── BOSSING ──
    {
      id: 'tormented_demons',
      name: 'Tormented Demons',
      category: 'bossing',
      note: 'Synapse drop. Requires a Greater Demon Slayer task.',
      reqs: () => [
        reqStat('Slayer', 85),
        reqStat('Attack', 85),
        reqStat('Strength', 85),
        reqOther('Quest: While Guthix Sleeps', hasQuest("While Guthix Sleeps")),
      ]
    },
    {
      id: 'corrupted_gauntlet',
      name: 'Corrupted Gauntlet',
      category: 'bossing',
      note: 'Crystal Armour & Bowfa. Late game lock-in.',
      reqs: () => [
        reqStat('Agility', 75),
        reqStat('Cooking', 70),
        reqStat('Crafting', 70),
        reqStat('Farming', 70),
        reqStat('Fishing', 70),
        reqStat('Herblore', 70),
        reqStat('Mining', 70),
        reqStat('Smithing', 70),
        reqStat('Woodcutting', 70),
        reqOther('Quest: Song of the Elves', hasQuest("Song of the Elves")),
      ]
    },
    {
      id: 'toa',
      name: 'Tombs of Amascut (150 Raid Level)',
      category: 'bossing',
      note: 'Highly recommended with a guide first run.',
      reqs: () => [
        reqStat('Attack', 90),
        reqStat('Ranged', 85),
        reqStat('Magic', 90),
        reqStat('Prayer', 77),
        reqOther('Quest: Beneath Cursed Sands', hasQuest("Beneath Cursed Sands")),
      ]
    },
    {
      id: 'calvarion',
      name: "Calvar'ion",
      category: 'bossing',
      note: 'Salve(ei) applies. D-pick 1/358. Hard cap recommended at 400kc.',
      reqs: () => [
        reqStat('Slayer', 1),
        reqItem('Salve amulet'),
        reqOther('Wilderness boss access', true),
      ]
    },
    {
      id: 'kq',
      name: 'Kalphite Queen',
      category: 'bossing',
      note: 'KQ Head 1/128 (guaranteed at 256kc). Required for Elite Desert Diary.',
      reqs: () => [
        reqStat('Defence', 70),
        reqItem('Keris partisan'),
        reqOther('Can flinch / safepot', true),
      ]
    },
    {
      id: 'royal_titans',
      name: 'Royal Titans',
      category: 'bossing',
      note: 'Prayer upgrades + Air Orbs. Needs a partner.',
      reqs: () => [
        reqStat('Slayer', 85),
        reqStat('Prayer', 70),
        reqOther('Partner available', false),
      ]
    },
    {
      id: 'zulrah',
      name: 'Zulrah',
      category: 'bossing',
      note: 'Tanzanite fang, magic fang, serpentine visage. Good for Ironman gear.',
      reqs: () => [
        reqStat('Magic', 75),
        reqStat('Ranged', 75),
        reqOther('Quest: Regicide', hasQuest('Regicide')),
      ]
    },
    {
      id: 'grotesque_guardians',
      name: 'Grotesque Guardians',
      category: 'bossing',
      note: 'Granite gloves, granite hammer, black tourmaline core.',
      reqs: () => [
        reqStat('Slayer', 75),
        reqOther('Obtained Brittle Key on Slayer task', false),
      ]
    },

    // ── SLAYER ──
    {
      id: 'slayer_85',
      name: 'Slayer 85',
      category: 'slayer',
      note: 'Unlocks Abyssal Whip via Abyssal Demons.',

// ─── Analysis engine ──────────────────────────────────────────────────────────
function evaluateActivity(activity) {
  // Milestones with a completed() check take priority
  if (activity.completed && activity.completed()) {
    return { ...activity, reqs: activity.reqs(), status: 'completed' };
  }

  const reqs = activity.reqs();
  const allMet = reqs.every(r => r.status === 'met');
  const anyUnmet = reqs.some(r => r.status === 'unmet');
  const anyClose = reqs.some(r => r.status === 'close');

  let status;
  if (allMet) status = 'unlocked';
  else if (!anyUnmet || (anyClose && reqs.filter(r => r.status === 'unmet').length <= 2)) status = 'close';
  else status = 'locked';

  return { ...activity, reqs, status };
}

// ─── Render ───────────────────────────────────────────────────────────────────
function runAnalysis() {
  document.getElementById('loader-section').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';

  // Char badge
  const name = state.character.account_name || 'Unknown';
  document.getElementById('char-name').textContent = name;
  const exp = new Date(state.character.exported_at);
  document.getElementById('char-export-time').textContent = exp.toLocaleString();
  document.getElementById('char-badge').style.display = 'block';

  renderStats();
  renderCards();
}

function renderStats() {
  const stats = state.character.stats;
  const icons = {
    Attack:'⚔️', Defence:'🛡️', Strength:'💪', Hitpoints:'❤️',
    Ranged:'🏹', Prayer:'🙏', Magic:'🔮', Cooking:'🍳',
    Woodcutting:'🪓', Fletching:'🏹', Fishing:'🐟', Firemaking:'🔥',
    Crafting:'💍', Smithing:'⚒️', Mining:'⛏️', Herblore:'🌿',
    Agility:'🏃', Thieving:'🗝️', Slayer:'💀', Farming:'🌱',
    Runecraft:'🌀', Hunter:'🦊', Construction:'🏠', Sailing:'⛵'
  };

  const bar = document.getElementById('stats-bar');
  bar.innerHTML = Object.entries(stats).map(([skill, data]) => `
    <div class="stat-pill ${data.real_level >= 99 ? 'maxed' : ''}">
      <span class="skill-icon">${icons[skill] || '📊'}</span>
      <span class="skill-name">${skill.slice(0,4)}</span>
      <span class="skill-level">${data.real_level}</span>
    </div>
  `).join('');
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filters .filter-btn').forEach(b => {
    if (['all','unlocked','close','locked'].some(x => b.textContent.toLowerCase().includes(x))) {
      b.classList.remove('active');
    }
  });
  btn.classList.add('active');
  renderCards();
}

function setCat(c, btn) {
  currentCat = c;
  document.querySelectorAll('.filters .filter-btn').forEach(b => {
    if (['all','bossing','slayer','skilling','diary','poh','⭐ milestones'].some(x => b.textContent.toLowerCase() === x)) {
      b.classList.remove('active');
    }
  });
  btn.classList.add('active');
  renderCards();
}

function renderCards() {
  const activities = getActivities().map(evaluateActivity);

  // Filter
  const filtered = activities.filter(a => {
    if (currentFilter !== 'all' && a.status !== currentFilter) return false;
    if (currentCat !== 'all' && a.category !== currentCat) return false;
    return true;
  });

  // Sort: unlocked first, then close, then locked, completed last
  const order = { unlocked: 0, close: 1, locked: 2, completed: 3 };
  filtered.sort((a, b) => order[a.status] - order[b.status]);

  // Summary
  const total = activities.length;
  const unlocked = activities.filter(a => a.status === 'unlocked').length;
  const close = activities.filter(a => a.status === 'close').length;
  const locked = activities.filter(a => a.status === 'locked').length;
  const completed = activities.filter(a => a.status === 'completed').length;

  document.getElementById('summary-bar').innerHTML = `
    <div class="summary-stat"><span class="s-num green">${unlocked}</span><span class="s-label">Unlocked</span></div>
    <div class="summary-stat"><span class="s-num amber">${close}</span><span class="s-label">Almost there</span></div>
    <div class="summary-stat"><span class="s-num red">${locked}</span><span class="s-label">Locked</span></div>
    <div class="summary-stat"><span class="s-num" style="color:var(--gold)">${completed}</span><span class="s-label">Completed</span></div>
    <div class="summary-stat"><span class="s-num" style="color:var(--text-dim)">${total}</span><span class="s-label">Total tracked</span></div>
  `;

  const container = document.getElementById('cards-container');

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="big-icon">🗺️</div>
        <h3>Nothing to show</h3>
        <p>Try adjusting the filters above.</p>
      </div>`;
    return;
  }

  // Group by status
  const groups = [
    { key: 'unlocked', label: 'Ready to do now', items: filtered.filter(a => a.status === 'unlocked') },
    { key: 'close', label: 'Almost there', items: filtered.filter(a => a.status === 'close') },
    { key: 'locked', label: 'Locked', items: filtered.filter(a => a.status === 'locked') },
    { key: 'completed', label: '✓ Completed', items: filtered.filter(a => a.status === 'completed') },
  ].filter(g => g.items.length > 0);

  container.innerHTML = groups.map(group => `
    <div class="section-heading">${group.label} (${group.items.length})</div>
    <div class="activity-grid">
      ${group.items.map(renderCard).join('')}
    </div>
  `).join('');
}

function renderCard(activity) {
  const badgeMap = {
    unlocked: '<span class="card-badge badge-unlocked">Ready</span>',
    close: '<span class="card-badge badge-close">Almost</span>',
    locked: '<span class="card-badge badge-locked">Locked</span>',
    completed: '<span class="card-badge badge-completed">✓ Done</span>',
  };

  const reqIcons = { met: 'met-icon', unmet: 'unmet-icon', close: 'close-icon' };
  const reqClasses = { met: 'met', unmet: 'unmet', close: 'close-req' };

  const reqsHtml = activity.reqs.map(r => `
    <li class="req-item ${reqClasses[r.status]}">
      <span class="req-icon ${reqIcons[r.status]}"></span>
      <span>${r.label}</span>
    </li>
  `).join('');

  return `
    <div class="activity-card ${activity.status}${activity.category === 'milestone' ? ' milestone-card' : ''}">
      <div class="card-header">
        <div>
          <div class="card-title">${activity.name}</div>
          <div class="card-category">${activity.category}</div>
        </div>
        ${badgeMap[activity.status]}
      </div>
      <ul class="reqs-list">${reqsHtml}</ul>
      ${activity.note ? `<div class="card-note">${activity.note}</div>` : ''}
    </div>
  `;
}
